services:
  agenthub:
    build: .
    container_name: agenthub
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - agenthub-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/agenthub.db
      - NODE_ENV=production
    env_file:
      - path: .env.local
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  agenthub-data:
    driver: local
