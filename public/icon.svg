<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient for the central hub -->
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </radialGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <!-- Satellite node gradient -->
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </radialGradient>
    <!-- Connection line gradient -->
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- Connection lines from hub to satellite nodes -->
  <!-- Top node -->
  <line x1="256" y1="256" x2="256" y2="100" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Top-right node -->
  <line x1="256" y1="256" x2="366" y2="146" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Right node -->
  <line x1="256" y1="256" x2="412" y2="256" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Bottom-right node -->
  <line x1="256" y1="256" x2="366" y2="366" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Bottom node -->
  <line x1="256" y1="256" x2="256" y2="412" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Bottom-left node -->
  <line x1="256" y1="256" x2="146" y2="366" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Left node -->
  <line x1="256" y1="256" x2="100" y2="256" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Top-left node -->
  <line x1="256" y1="256" x2="146" y2="146" stroke="#818CF8" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round"/>

  <!-- Inter-node arcs (connecting satellite nodes to each other) -->
  <!-- Outer orbital ring -->
  <circle cx="256" cy="256" r="156" fill="none" stroke="#818CF8" stroke-width="2.5" stroke-opacity="0.25" stroke-dasharray="12 8"/>

  <!-- Inner orbital ring -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#A5B4FC" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="6 10"/>

  <!-- Satellite nodes (8 around the hub) -->
  <!-- Top -->
  <circle cx="256" cy="100" r="22" fill="url(#nodeGrad)" opacity="0.95"/>
  <circle cx="256" cy="100" r="10" fill="#E0E7FF"/>
  <!-- Top-right -->
  <circle cx="366" cy="146" r="18" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="366" cy="146" r="8" fill="#E0E7FF"/>
  <!-- Right -->
  <circle cx="412" cy="256" r="22" fill="url(#nodeGrad)" opacity="0.95"/>
  <circle cx="412" cy="256" r="10" fill="#E0E7FF"/>
  <!-- Bottom-right -->
  <circle cx="366" cy="366" r="18" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="366" cy="366" r="8" fill="#E0E7FF"/>
  <!-- Bottom -->
  <circle cx="256" cy="412" r="22" fill="url(#nodeGrad)" opacity="0.95"/>
  <circle cx="256" cy="412" r="10" fill="#E0E7FF"/>
  <!-- Bottom-left -->
  <circle cx="146" cy="366" r="18" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="146" cy="366" r="8" fill="#E0E7FF"/>
  <!-- Left -->
  <circle cx="100" cy="256" r="22" fill="url(#nodeGrad)" opacity="0.95"/>
  <circle cx="100" cy="256" r="10" fill="#E0E7FF"/>
  <!-- Top-left -->
  <circle cx="146" cy="146" r="18" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="146" cy="146" r="8" fill="#E0E7FF"/>

  <!-- Central hub - outer glow -->
  <circle cx="256" cy="256" r="58" fill="#818CF8" opacity="0.2"/>
  <!-- Central hub - main circle -->
  <circle cx="256" cy="256" r="48" fill="url(#hubGlow)"/>
  <!-- Central hub - inner highlight -->
  <circle cx="256" cy="256" r="30" fill="#A5B4FC" opacity="0.5"/>
  <!-- Central hub - bright core -->
  <circle cx="256" cy="256" r="18" fill="#E0E7FF" opacity="0.9"/>

  <!-- Small "A" letterform in the center for AgentHub branding -->
  <text x="256" y="268" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="28" fill="#312E81" letter-spacing="-1">A</text>
</svg>
