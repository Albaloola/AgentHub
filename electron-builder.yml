appId: com.agenthub.desktop
productName: AgentHub
directories:
  output: release
afterPack: ./scripts/electron-after-pack.js

files:
  - dist/desktop/**/*
  - package.json

extraResources:
  - from: .next/standalone
    to: app
    filter:
      - "**/*"
      - "**/.*"

asar: true

# --- Linux ---
linux:
  icon: packaging/icons
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  category: Utility
  synopsis: Multi-agent orchestration dashboard

appImage:
  artifactName: AgentHub-${version}-${arch}.AppImage

deb:
  artifactName: agenthub_${version}_${arch}.deb

rpm:
  artifactName: agenthub-${version}-${arch}.rpm

# --- macOS ---
mac:
  icon: packaging/icons/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  artifactName: AgentHub-${version}-${arch}.dmg
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# --- Windows ---
win:
  icon: packaging/icons/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: AgentHub-${version}-Setup-${arch}.exe
  shortcutName: AgentHub

portable:
  artifactName: AgentHub-${version}-Portable-${arch}.exe
